buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"
subprojects {
    configurations.configureEach {
        resolutionStrategy {
            force "com.google.android.gms:play-services-ads:24.6.0"
            force "com.google.android.gms:play-services-ads-lite:24.6.0"

            force "org.jetbrains.kotlin:kotlin-stdlib:2.1.20"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.1.20"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.1.20"
        }
    }
}